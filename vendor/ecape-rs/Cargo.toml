[package]
name = "ecape-rs"
version = "0.1.4"
edition = "2024"
description = "Rust ECAPE parcel calculations with parity-verified behavior against ecape-parcel"
license = "MIT"
repository = "https://github.com/FahrenheitResearch/ecape-rs"
readme = "README.md"

[lib]
name = "ecape_rs"
path = "src/lib.rs"

[[bin]]
name = "run_case"
path = "src/bin/run_case.rs"

[[bin]]
name = "run_case_raw"
path = "src/bin/run_case_raw.rs"

[dependencies]
wx-math = { path = "../wx-math" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
