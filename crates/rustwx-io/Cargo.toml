rustwx-core = { path = "../rustwx-core" }
rustwx-models = { path = "../rustwx-models" }
wx-core = { path = "../../vendor/wx-core", default-features = false, features = ["network"] }

[dev-dependencies]
chrono = { version = "0.4", default-features = false }
