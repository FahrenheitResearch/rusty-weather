[package]
name = "rustwx-io"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
rust-version.workspace = true

[features]
default = []

[dependencies]
bincode = "1.3"
grib-core = { path = "../../vendor/grib-core" }
memmap2 = "0.9"
